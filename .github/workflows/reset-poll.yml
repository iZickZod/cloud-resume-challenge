name: Reset Poll

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Reset all poll counts to 0
        run: |
          for OPTION in recruiter student developer browsing other; do
            aws dynamodb put-item \
              --table-name portfolio-poll \
              --item "{\"option\":{\"S\":\"$OPTION\"},\"count\":{\"N\":\"0\"}}" \
              --region us-east-2
            echo "Reset: $OPTION"
          done
