name: Deploy Resume to S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # ── BACKEND: DynamoDB tables, Lambda, API Gateway ──────────────────────
      - name: Deploy interactions backend
        id: backend
        run: |
          REGION=us-east-2
          FUNCTION=portfolio-interactions
          API_NAME=portfolio-interactions-api

          # DynamoDB tables (idempotent)
          for TABLE in portfolio-reactions portfolio-contact portfolio-poll; do
            KEY=$([ "$TABLE" = "portfolio-reactions" ] && echo "projectId" || \
                  [ "$TABLE" = "portfolio-contact"   ] && echo "id"        || echo "option")
            aws dynamodb create-table \
              --table-name $TABLE \
              --attribute-definitions AttributeName=$KEY,AttributeType=S \
              --key-schema AttributeName=$KEY,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region $REGION 2>/dev/null || true
          done

          # IAM role (create if missing)
          ROLE_ARN=$(aws iam get-role --role-name portfolio-interactions-role \
            --query 'Role.Arn' --output text 2>/dev/null) || true
          if [ -z "$ROLE_ARN" ] || [ "$ROLE_ARN" = "None" ]; then
            ROLE_ARN=$(aws iam create-role --role-name portfolio-interactions-role \
              --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}' \
              --query 'Role.Arn' --output text)
            aws iam attach-role-policy --role-name portfolio-interactions-role \
              --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
            aws iam attach-role-policy --role-name portfolio-interactions-role \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
            sleep 15
          fi

          # Package Lambda
          zip interactions.zip interactions_lambda.py

          # Create or update Lambda function
          if aws lambda get-function --function-name $FUNCTION --region $REGION 2>/dev/null; then
            aws lambda update-function-code --function-name $FUNCTION \
              --zip-file fileb://interactions.zip --region $REGION
          else
            aws lambda create-function --function-name $FUNCTION \
              --runtime python3.12 --role $ROLE_ARN \
              --handler interactions_lambda.lambda_handler \
              --zip-file fileb://interactions.zip --region $REGION
            aws lambda wait function-active --function-name $FUNCTION --region $REGION

            # HTTP API Gateway
            API_ID=$(aws apigatewayv2 create-api \
              --name $API_NAME --protocol-type HTTP \
              --cors-configuration 'AllowOrigins=["*"],AllowMethods=["GET","POST","OPTIONS"],AllowHeaders=["Content-Type"]' \
              --region $REGION --query 'ApiId' --output text)

            LAMBDA_ARN=$(aws lambda get-function --function-name $FUNCTION \
              --region $REGION --query 'Configuration.FunctionArn' --output text)

            INT_ID=$(aws apigatewayv2 create-integration --api-id $API_ID \
              --integration-type AWS_PROXY --integration-uri $LAMBDA_ARN \
              --payload-format-version 2.0 --region $REGION \
              --query 'IntegrationId' --output text)

            for ROUTE in "GET /reactions" "POST /reactions" "POST /contact" "GET /poll" "POST /poll"; do
              aws apigatewayv2 create-route --api-id $API_ID \
                --route-key "$ROUTE" --target "integrations/$INT_ID" --region $REGION
            done

            aws apigatewayv2 create-stage --api-id $API_ID \
              --stage-name '$default' --auto-deploy --region $REGION

            ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
            aws lambda add-permission --function-name $FUNCTION \
              --statement-id api-gateway-invoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:$REGION:$ACCOUNT:$API_ID/*" \
              --region $REGION
          fi

          # Get API URL (works whether just created or already existed)
          API_ID=$(aws apigatewayv2 get-apis --region $REGION \
            --query "Items[?Name=='$API_NAME'].ApiId" --output text)
          echo "INTERACTIONS_API=https://$API_ID.execute-api.$REGION.amazonaws.com" >> $GITHUB_OUTPUT

      # ── FRONTEND: inject API URL, upload to S3 ─────────────────────────────
      - name: Inject API URL and deploy frontend
        run: |
          sed -i "s|__INTERACTIONS_API__|${{ steps.backend.outputs.INTERACTIONS_API }}|g" index.html
          aws s3 sync . s3://isaac-sodimu-resume \
            --exclude "*" --include "index.html" --include "favicon.svg"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E2UNC60ZGG94BR --paths "/*"
